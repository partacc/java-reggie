stages:
  - build
  - publish
  - generate-signing-key

variables:
  REGISTRY: registry.ddbuild.io
  # Reuse a dd-trace-java builder image — provides Java 21, Gradle wrapper support, and AWS CLI.
  # Pin to a specific digest via the images mirror when a dedicated image is available.
  BUILDER_IMAGE: "registry.ddbuild.io/images/mirror/dd-trace-java-docker-build:ci-base"
  # Route external Maven/Gradle resolution through Datadog's internal proxy.
  MAVEN_REPOSITORY_PROXY: "https://depot-read-api-java.us1.ddbuild.io/magicmirror/magicmirror/@current/"

default:
  tags: ["arch:amd64"]

.gradle_job:
  image: $BUILDER_IMAGE
  before_script:
    - export JAVA_HOME=$JAVA_21_HOME
    - export PATH=$JAVA_HOME/bin:$PATH
    - export ORG_GRADLE_PROJECT_mavenRepositoryProxy=$MAVEN_REPOSITORY_PROXY
    - export ORG_GRADLE_PROJECT_gradlePluginProxy=$MAVEN_REPOSITORY_PROXY
    - export GRADLE_ARGS="--no-daemon --stacktrace --parallel"

.publish_sa:
  variables:
    KUBERNETES_SERVICE_ACCOUNT_OVERWRITE: java-reggie

build:
  extends: .gradle_job
  stage: build
  script:
    - ./gradlew build -x :reggie-integration-tests:test $GRADLE_ARGS
  artifacts:
    when: always
    reports:
      junit: "**/build/test-results/**/*.xml"

publish_to_maven_central:
  extends:
    - .gradle_job
    - .publish_sa
  stage: publish
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'
      when: on_success
    - when: manual
      allow_failure: true
  # Maven Central credentials: written via scripts/update-maven-central-secrets.sh
  # GPG signing key: created via the create_key job below
  # Both are stored in AWS SSM and read via the java-reggie K8s service account IAM role.
  script:
    - 'ORG_GRADLE_PROJECT_mavenCentralUsername=$(aws ssm get-parameter --region us-east-1 --name ci.java-reggie.maven_central_username --with-decryption --query "Parameter.Value" --out text) || { echo "ERROR: SSM read failed for mavenCentralUsername"; exit 1; }'
    - export ORG_GRADLE_PROJECT_mavenCentralUsername
    - 'ORG_GRADLE_PROJECT_mavenCentralPassword=$(aws ssm get-parameter --region us-east-1 --name ci.java-reggie.maven_central_password --with-decryption --query "Parameter.Value" --out text) || { echo "ERROR: SSM read failed for mavenCentralPassword"; exit 1; }'
    - export ORG_GRADLE_PROJECT_mavenCentralPassword
    - 'export GPG_PRIVATE_KEY=$(aws ssm get-parameter --region us-east-1 --name ci.java-reggie.signing.gpg_private_key --with-decryption --query "Parameter.Value" --out text) || { echo "ERROR: SSM read failed for GPG_PRIVATE_KEY"; exit 1; }'
    - 'export GPG_PASSWORD=$(aws ssm get-parameter --region us-east-1 --name ci.java-reggie.signing.gpg_passphrase --with-decryption --query "Parameter.Value" --out text) || { echo "ERROR: SSM read failed for GPG_PASSWORD"; exit 1; }'
    - ./gradlew :reggie-runtime:publishAllPublicationsToMavenCentralRepository $GRADLE_ARGS

publish_snapshot:
  extends:
    - .gradle_job
    - .publish_sa
  stage: publish
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
  script:
    - 'SONATYPE_USERNAME=$(aws ssm get-parameter --region us-east-1 --name ci.java-reggie.maven_central_username --with-decryption --query "Parameter.Value" --out text) || { echo "ERROR: SSM read failed for username"; exit 1; }'
    - 'SONATYPE_PASSWORD=$(aws ssm get-parameter --region us-east-1 --name ci.java-reggie.maven_central_password --with-decryption --query "Parameter.Value" --out text) || { echo "ERROR: SSM read failed for password"; exit 1; }'
    - '[[ -n "$SONATYPE_USERNAME" ]] || { echo "ERROR: SONATYPE_USERNAME is empty"; exit 1; }'
    - '[[ -n "$SONATYPE_PASSWORD" ]] || { echo "ERROR: SONATYPE_PASSWORD is empty"; exit 1; }'
    - export SONATYPE_USERNAME SONATYPE_PASSWORD
    - 'export GPG_PRIVATE_KEY=$(aws ssm get-parameter --region us-east-1 --name ci.java-reggie.signing.gpg_private_key --with-decryption --query "Parameter.Value" --out text) || { echo "ERROR: SSM read failed for GPG_PRIVATE_KEY"; exit 1; }'
    - 'export GPG_PASSWORD=$(aws ssm get-parameter --region us-east-1 --name ci.java-reggie.signing.gpg_passphrase --with-decryption --query "Parameter.Value" --out text) || { echo "ERROR: SSM read failed for GPG_PASSWORD"; exit 1; }'
    - ./gradlew :reggie-runtime:publishToSonatype $GRADLE_ARGS

# Run once manually to generate the GPG signing key and store it in AWS SSM
# under ci.java-reggie.signing.*. The public key is exported as a job artifact
# and uploaded to the public keyserver if EXPORT_TO_KEYSERVER=true.
create_key:
  stage: generate-signing-key
  tags: ["arch:amd64"]
  when: manual
  needs: []
  variables:
    PROJECT_NAME: "java-reggie"
    EXPORT_TO_KEYSERVER: "true"
  image: $REGISTRY/ci/agent-key-management-tools/gpg:1
  script:
    - /create.sh
  artifacts:
    expire_in: 13 months
    paths:
      - pubkeys
