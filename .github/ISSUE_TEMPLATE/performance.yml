name: Performance Issue
description: Report a performance regression or unexpectedly slow pattern
labels: ["type/performance"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to report performance regressions or patterns that are slower than expected.
  - type: input
    id: reggie-version
    attributes:
      label: Reggie Version
      placeholder: e.g., 1.2.3
    validations:
      required: true
  - type: input
    id: java-version
    attributes:
      label: Java Version
      placeholder: e.g., Java 21.0.2
    validations:
      required: true
  - type: input
    id: pattern
    attributes:
      label: Regex Pattern
      description: The slow pattern
    validations:
      required: true
  - type: textarea
    id: benchmark
    attributes:
      label: Benchmark Results
      description: Include throughput numbers for Reggie vs JDK Pattern
      render: text
    validations:
      required: true
  - type: textarea
    id: baseline
    attributes:
      label: Previous Baseline
      description: If this is a regression, what was the previous performance?
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Debug output, profiling data, or other relevant information
    validations:
      required: false
