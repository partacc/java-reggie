plugins {
    id 'java-library'
    id 'com.vanniktech.maven.publish'
}

description = 'Reggie - high-performance regex with compile-time and runtime pattern compilation'

repositories {
    mavenCentral()
}

dependencies {
    // Internal modules bundled into the published JAR; removed from POM via withXml below
    api project(':reggie-annotations')
    implementation project(':reggie-codegen')

    // ASM - real runtime dependency, kept in the published POM
    implementation 'org.ow2.asm:asm:9.9.1'
    implementation 'org.ow2.asm:asm-commons:9.9.1'
    implementation 'org.ow2.asm:asm-util:9.9.1'

    testImplementation 'org.junit.jupiter:junit-jupiter:6.0.3'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

// Bundle all internal modules into the single published JAR.
// reggie-processor is included so users can declare this artifact as both
// 'implementation' and 'annotationProcessor' without a separate dependency.
jar {
    dependsOn ':reggie-processor:classes'
    from project(':reggie-annotations').sourceSets.main.output
    from project(':reggie-codegen').sourceSets.main.output
    from project(':reggie-processor').sourceSets.main.output
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

// Gradle Module Metadata (.module files) bypasses withXml POM stripping and
// still lists bundled submodules as dependencies. Disable it so consumers
// resolve via the POM only, where internal coordinates are already removed.
tasks.withType(GenerateModuleMetadata).configureEach {
    enabled = false
}

// Publish as com.datadoghq:reggie rather than com.datadoghq:reggie-runtime so
// the artifact ID reflects that this is the full, self-contained library.
// Strip bundled internal module coordinates from the POM so consumers only
// see the real external dependency (ASM).
mavenPublishing {
    coordinates('com.datadoghq', 'reggie', project.version.toString())
    pom {
        withXml {
            def deps = asNode().dependencies[0]
            if (deps) {
                deps.dependency.findAll { it.groupId.text() == 'com.datadoghq' }
                        .each { deps.remove(it) }
            }
        }
    }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

tasks.named('test') {
    useJUnitPlatform()
    jvmArgs('--add-opens', 'java.base/java.lang=ALL-UNNAMED')
    // Pass system properties for bytecode debugging
    systemProperty 'reggie.debug.trace', System.getProperty('reggie.debug.trace')
}

// Task to run bytecode debugger
tasks.register('debugPattern', JavaExec) {
    description = 'Debug bytecode generation for a regex pattern'
    group = 'debug'
    mainClass = 'com.datadoghq.reggie.debug.BytecodeDebugger'
    classpath = sourceSets.main.runtimeClasspath

    // Usage: ./gradlew debugPattern -Ppattern="a{30,}" [-PoutputDir=/tmp/debug]
    if (project.hasProperty('pattern')) {
        args project.property('pattern')
        if (project.hasProperty('outputDir')) {
            args project.property('outputDir')
        }
    } else {
        // Default example if no pattern specified
        args "\\d+"
    }
}

tasks.register('verifyCoverage', JacocoCoverageVerification) {
    violationRules {
        rule {
            limit {
                counter = 'LINE'
                minimum = 0.75  // 75% target for public API
            }
        }
    }
}
